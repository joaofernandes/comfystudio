name: Release Desktop Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build or rebuild (for example v0.1.11)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  ensure-release:
    name: Ensure Release Exists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Create or reuse draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Reusing existing release $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --draft \
              --verify-tag \
              --title "ComfyStudio $RELEASE_TAG" \
              --notes-file docs/RELEASE_DRAFT_TEMPLATE.md
          fi

  build-windows:
    name: Build Windows
    needs: ensure-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: app_version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "app_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Windows artifacts
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload Windows release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ steps.app_version.outputs.app_version }}"
          gh release upload $env:RELEASE_TAG `
            "release/ComfyStudio-$version-windows-installer-x64.exe#Windows Installer" `
            "release/ComfyStudio-$version-windows-portable-x64.exe#Windows Portable" `
            --clobber

  build-linux:
    name: Build Linux
    needs: ensure-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Prepare Linux icons
        run: |
          mkdir -p build/icons
          cp build/icon.png build/icons/256x256.png
          cp build/icon.png build/icons/512x512.png

      - name: Read app version
        id: app_version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "app_version=$version" >> "$GITHUB_OUTPUT"

      - name: Build Linux artifacts
        run: npm run build && npx electron-builder --linux --publish never

      - name: Upload Linux release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.app_version.outputs.app_version }}"
          gh release upload "$RELEASE_TAG" \
            "release/ComfyStudio-${VERSION}-linux-x64.AppImage#Linux AppImage" \
            "release/ComfyStudio-${VERSION}-linux-x64.deb#Linux deb" \
            --clobber

  build-macos:
    name: Build macOS
    needs: ensure-release
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Assert macOS signing and notarization secrets
        run: |
          missing=()
          for var in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required GitHub secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Validate notarization credentials
        run: |
          xcrun notarytool history \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            >/dev/null

      - name: Read app version
        id: app_version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "app_version=$version" >> "$GITHUB_OUTPUT"

      - name: Build macOS artifacts
        run: npm run build && npx electron-builder --mac --publish never

      - name: Upload macOS release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.app_version.outputs.app_version }}"
          gh release upload "$RELEASE_TAG" \
            "release/ComfyStudio-${VERSION}-mac-arm64.dmg#Mac (Apple Silicon)" \
            "release/ComfyStudio-${VERSION}-mac-x64.dmg#Mac (Intel)" \
            --clobber
